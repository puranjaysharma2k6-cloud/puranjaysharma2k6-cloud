<svg xmlns="http://www.w3.org/2000/svg" width="500" height="70" viewBox="0 0 500 70">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&amp;display=swap');
      
      .text {
        font-family: 'Inter', sans-serif;
        font-size: 38px;
        font-weight: 600;
        fill: #4493F8;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      
      /* The sliding animation */
      .carousel {
        animation: slideUp 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      
      /* Keyframes to hold the text, slide up, hold, and loop */
      @keyframes slideUp {
        0%, 40% { transform: translateY(0); }
        50%, 90% { transform: translateY(-70px); }
        100% { transform: translateY(-140px); }
      }
    </style>
  </defs>

  <clipPath id="clip">
    <rect width="500" height="70" />
  </clipPath>
  
  <g clip-path="url(#clip)">
    <g class="carousel">
      <text x="250" y="35" class="text">Competitive Programmer</text>
      <text x="250" y="105" class="text">Backend Developer</text>
      <text x="250" y="175" class="text">Competitive Programmer</text>
    </g>
  </g>
</svg>
